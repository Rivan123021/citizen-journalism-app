<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Citizen Journalist Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;

            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* MAIN APP CONTAINER */
        .app-container {
            width: 100%;
            max-width: 420px;
            height: 95vh;
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* SCREEN FIX */
        .screen {
            display: none;
            width: 100%;
            height: 100%;
            overflow-y: auto;
        }

        .active {
            display: block;
        }

        /* CARD UI */
        .card {
            background: rgba(255, 255, 255, 0.12);
            padding: 20px;
            border-radius: 16px;
            width: 90%;
            margin: auto;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        /* HEADER */
        .header {
            text-align: center;
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 18px;
        }

        /* INPUTS */
        input,
        textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            border: none;
        }
        /* BUTTONS */
        .btn {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        .primary {
            background: #2196f3;
        }

        .green {
            background: #4caf50;
        }

        .red {
            background: #ff4b5c;
        }

        .gray {
            background: #555;
        }

        /* MAP */
        #map {
            height: 200px;
            border-radius: 10px;
            margin-top: 10px;
        }

        /* DASHBOARD */
        #dataList {
            max-height: 60vh;
            overflow-y: auto;
        }

        .data-card {
            background: rgba(255, 255, 255, 0.15);
            padding: 12px;
            margin: 12px 0;
            border-radius: 12px;
        }

        .tag {
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: bold;
        }

        .tag-complaint {
            background: #ff4b5c;
        }

        .tag-report {
            background: #4caf50;
        }

        .tag-help {
            background: #2196f3;
        }

        .timestamp {
            font-size: 11px;
            color: #ccc;
        }

        .preview-img {
            width: 100%;
            border-radius: 8px;
            margin-top: 8px;
        }

        /* MOBILE FIX */
        @media (max-width: 500px) {
            .app-container {
                height: auto;
            }
        }
    </style>
</head>

<body>

    <div class="app-container">

        <!-- LOGIN -->
        <div id="login" class="screen active">
            <div class="card">
                <div class="header">Login</div>
                <input id="loginUser" placeholder="Username">
                <input id="loginPass" type="password" placeholder="Password">
                <button class="btn primary" onclick="login()">Login</button>
                <button class="btn gray" onclick="show('signup')">Signup</button>
            </div>
        </div>

        <!-- SIGNUP -->
        <div id="signup" class="screen">
            <div class="card">
                <div class="header">Signup</div>
                <input id="newUser" placeholder="Username">
                <input id="newPass" type="password" placeholder="Password">
                <button class="btn green" onclick="signup()">Create Account</button>
                <button class="btn gray" onclick="show('login')">Back</button>
            </div>
        </div>

        <!-- HOME -->
        <div id="home" class="screen">
            <div class="card">
                <div class="header">Citizen Journalist</div>
                <button class="btn red" onclick="show('complaint')">Complaint</button>
                <button class="btn green" onclick="show('report'); setTimeout(initMap,200)">Report News</button>
                <button class="btn primary" onclick="show('coordinate')">Request Help</button>
                <button class="btn gray" onclick="loadDashboard()">Dashboard</button>
                <button class="btn gray" onclick="logout()">Logout</button>
            </div>
        </div>

        <!-- COMPLAINT -->
        <div id="complaint" class="screen">
            <div class="card">
                <div class="header">Complaint</div>
                <input id="cname" placeholder="Your Name">
                <textarea id="cmsg" placeholder="Describe your complaint"></textarea>
                <button class="btn red" onclick="saveData('complaint')">Submit</button>
                <button class="btn gray" onclick="show('home')">Back</button>
            </div>
        </div>

        <!-- REPORT -->
        <div id="report" class="screen">
            <div class="card">
                <div class="header">Report News</div>

                <input id="rlocation" placeholder="Location Name">
                <textarea id="rdesc" placeholder="Incident Description"></textarea>

                <div id="map"></div>
                <p id="coords">No location selected</p>

                <button class="btn primary" onclick="getLocation()">📍 Get My Location</button>

                <input type="file" id="cameraInput" accept="image/*" capture="environment"
                    onchange="previewImage(event)" style="display:none;">
                <input type="file" id="galleryInput" accept="image/*" onchange="previewImage(event)"
                    style="display:none;">
                <input type="file" id="fileInput" onchange="previewImage(event)" style="display:none;">

                <button class="btn primary" onclick="openCamera()">📸 Take Photo</button>
                <button class="btn green" onclick="openGallery()">🖼️ Choose Photo</button>
                <button class="btn gray" onclick="openFile()">📁 Upload File</button>

                <img id="preview" style="display:none; width:100%; margin-top:10px;">

                <button class="btn green" onclick="saveData('report')">Submit</button>
                <button class="btn gray" onclick="show('home')">Back</button>
            </div>
        </div>

        <!-- COORDINATE -->
        <div id="coordinate" class="screen">
            <div class="card">
                <div class="header">Request Help</div>
                <input id="area" placeholder="Area / Location">
                <textarea id="help" placeholder="Describe Help"></textarea>
                <button class="btn primary" onclick="saveData('coordinate')">Send</button>
                <button class="btn gray" onclick="show('home')">Back</button>
            </div>
        </div>

        <!-- DASHBOARD -->
        <div id="dashboard" class="screen">
            <div class="card">
                <div class="header">Dashboard</div>
                <div id="dataList"></div>
                <button class="btn gray" onclick="show('home')">Back</button>
            </div>
        </div>

    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script>
        let selectedFile = null;

        function show(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function signup() {
            localStorage.setItem("user", newUser.value);
            localStorage.setItem("pass", newPass.value);
            alert("Account created!");
            show('login');
        }

        function login() {
            if (loginUser.value === localStorage.getItem("user") &&
                loginPass.value === localStorage.getItem("pass")) {
                show('home');
            } else alert("Invalid login");
        }

        function logout() { show('login'); }

        function openCamera() { cameraInput.click(); }
        function openGallery() { galleryInput.click(); }
        function openFile() { fileInput.click(); }

        function previewImage(e) {
            selectedFile = e.target.files[0];
            if (selectedFile) {
                preview.src = URL.createObjectURL(selectedFile);
                preview.style.display = "block";
            }
        }

        function saveData(type) {
            let data = { type, time: new Date().toLocaleString() };

            if (type === 'complaint') {
                data.typeName = "Complaint";
                data.name = cname.value;
                data.msg = cmsg.value;
                store(data);
            }

            if (type === 'report') {
                data.typeName = "Report News";
                data.location = rlocation.value;
                data.desc = rdesc.value;
                data.coords = coords.innerText;

                if (selectedFile) {
                    let reader = new FileReader();
                    reader.onload = e => {
                        data.image = e.target.result;
                        store(data);
                    };
                    reader.readAsDataURL(selectedFile);
                } else store(data);
            }

            if (type === 'coordinate') {
                data.typeName = "Request Help";
                data.area = area.value;
                data.help = help.value;
                store(data);
            }
        }

        function store(data) {
            let all = JSON.parse(localStorage.getItem("data") || "[]");
            all.push(data);
            localStorage.setItem("data", JSON.stringify(all));
            alert("Saved!");
            show('home');
        }

        function loadDashboard() {
            let all = JSON.parse(localStorage.getItem("data") || "[]");
            let html = "";

            all.reverse().forEach(d => {
                let tagClass = d.type === 'complaint' ? 'tag-complaint' :
                    d.type === 'report' ? 'tag-report' : 'tag-help';

                html += `<div class="data-card">
<span class="tag ${tagClass}">${d.typeName}</span>
<div class="timestamp">${d.time}</div>`;

                if (d.type === 'complaint') {
                    html += `<p><b>Name:</b> ${d.name}</p>
<p><b>Complaint:</b> ${d.msg}</p>`;
                }

                if (d.type === 'report') {
                    html += `<p><b>Location:</b> ${d.location}</p>
<p><b>Description:</b> ${d.desc}</p>
<p><b>Coords:</b> ${d.coords}</p>
${d.image ? `<img src="${d.image}" class="preview-img">` : ""}`;
                }

                if (d.type === 'coordinate') {
                    html += `<p><b>Area:</b> ${d.area}</p>
<p><b>Help:</b> ${d.help}</p>`;
                }

                html += `</div>`;
            });

            dataList.innerHTML = html || "No data yet";
            show('dashboard');
        }

        let map, marker;
        function initMap() {
            if (map) return;
            map = L.map('map').setView([-6.2, 106.8], 10);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            map.on('click', e => setMarker(e.latlng.lat, e.latlng.lng));
        }

        function setMarker(lat, lng) {
            if (marker) map.removeLayer(marker);
            marker = L.marker([lat, lng]).addTo(map);
            coords.innerText = `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
        }

        function getLocation() {
            navigator.geolocation.getCurrentPosition(pos => {
                let lat = pos.coords.latitude;
                let lng = pos.coords.longitude;
                map.setView([lat, lng], 13);
                setMarker(lat, lng);
            });
        }
    </script>

</body>

</html>
